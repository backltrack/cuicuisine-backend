# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  server:
    container_name: cuicuisine-server
    build:
      context: .
    expose:
      - 8000
    restart: always
    depends_on:
      - server-database
    environment:
      - MONGO_ALIAS=mongodb
      - MONGO_PORT=27017
      - ENV=production
      - LOGLEVEL=${LOGLEVEL}
      - LOGDIRPATH=${LOGDIRPATH}
      - GMAIL_ADDRESS=${GMAIL_ADDRESS}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - SECRET_KEY_ACCESS=${SECRET_KEY_ACCESS}
      - SECRET_KEY_REFRESH=${SECRET_KEY_REFRESH}
    volumes:
      - ${STORAGE}:/app/storage/:rw
      - ${LOGDIRPATH}:/app/logs/:rw
    develop:
      watch:
        - action: rebuild
          path: .

  caddy:
    image: caddy:2-alpine
    container_name: cuicuisine-caddy
    restart: always
    depends_on:
      - server
    ports:
      - 80:80
      - 443:443
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${GMAIL_ADDRESS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  server-database:
    image: mongo:${MONGOVERS}
    container_name: mongodb
    environment:
      - GLIBC_TUNABLES=glibc.cpu.hwcaps=-SHSTK
    command: ["mongod", "--config", "/etc/mongodb.conf/mongodb.conf"]
    ports:
      - 27018:27017
    volumes:
      - ${DB}/data:/data/db:rw # Persist MongoDB data
      - ${DB}/config/:/etc/mongodb.conf/:ro # Mount MongoDB configuration file

volumes:
  caddy_data:
  caddy_config:
